name: Daily University News to Slack

on:
  schedule:
    # UTC 22:00 = JST 7:00 (翌日)
    - cron: "0 22 * * *"
  workflow_dispatch: {}  # 手動実行用（Actionsタブから "Run workflow" で即テスト可能）

permissions:
  contents: write  # state.json をコミットするために必要

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch news and notify Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python fetch_and_notify.py

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "chore: update last posted state"
          git push
